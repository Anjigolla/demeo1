name: print all github-action context1

on:
  workflow_dispatch:
    inputs:
      env:
        description: "Target environment"
        required: true
        type: environment

      deploy:
        description: "Perform deployment"
        required: true
        default: true
        type: boolean

      dry_run:
        description: "Run without making changes"
        required: true
        default: false
        type: boolean

      log_level:
        description: "Logging level"
        required: true
        type: choice
        options:
          - DEBUG
          - INFO
          - WARN
          - ERROR

      version:
        description: "Version to deploy"
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Print inputs
        run: |
          echo "Environment: ${{ inputs.env }}"
          echo "Deploy: ${{ inputs.deploy }}"
          echo "Dry Run: ${{ inputs.dry_run }}"
          echo "Log Level: ${{ inputs.log_level }}"
          echo "Version: ${{ inputs.version }}"