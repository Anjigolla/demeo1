name: Hello World Workflow
# Trigger workflow on push or manual dispatch
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  say-hello:
    runs-on: ubuntu-latest  # Use the latest Ubuntu runner

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Run a simple shell command
      - name: Print Hello World
        run: echo "Hello, World! 🎉"

      # Step 3: Run a multi-line script
      - name: Multi-line script example
        run: |
          echo "This is a GitHub Actions job."
          echo "It runs on Ubuntu and prints messages."






